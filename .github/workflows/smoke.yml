name: smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap smoke
        run: ./tests/smoke.sh
      - name: init.sh smoke
        run: ./tests/init-smoke.sh
      - name: obsidian-defaults paths
        run: ./tests/obsidian-defaults-paths.sh
